<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Dionio Bot</title>
	<style>
		:root {
			--bg: #f7f3ea;
			--card: #fffaf2;
			--text: #1f1f1f;
			--muted: #575757;
			--accent: #0f766e;
			--border: #e7dcc6;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 20% 20%, #ffe8b8 0%, transparent 45%),
				radial-gradient(circle at 80% 80%, #cdebe8 0%, transparent 40%),
				var(--bg);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		main {
			width: min(720px, 100%);
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 28px;
			box-shadow: 0 12px 28px rgba(31, 31, 31, 0.08);
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(1.6rem, 3vw, 2.2rem);
			line-height: 1.2;
			letter-spacing: 0.02em;
		}

		p {
			margin: 0;
			color: var(--muted);
			font-size: 1rem;
			line-height: 1.65;
		}

		.badge {
			display: inline-block;
			margin-bottom: 14px;
			padding: 6px 12px;
			border-radius: 999px;
			background: rgba(15, 118, 110, 0.12);
			color: var(--accent);
			font-weight: 700;
			font-size: 0.8rem;
			letter-spacing: 0.05em;
			text-transform: uppercase;
		}
	</style>
</head>
<body>
	<main>
		<span class="badge">Status</span>
		<h1>This project does not have a proper front end yet.</h1>
		<p>
			You are seeing a temporary placeholder page while the real interface is still in development.
			The backend/bot logic is being set up first, and a full frontend will be added later.
		</p>
	</main>
</body>
</html>
